<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Мебель Шара — партнёрский кабинет</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 44px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 1px 0 rgba(255,255,255,0.5) inset;
      border: 0.5px solid rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    .fade-in {
      animation: fadeIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .auth-card {
      padding: 40px 28px;
      text-align: center;
    }
    .auth-card h1 {
      font-size: 32px;
      font-weight: 600;
      background: linear-gradient(135deg, #1e3c2c, #2a6e3a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .auth-card p {
      color: #3a4a3c;
      margin-bottom: 24px;
    }
    .ios-input {
      background: rgba(255,255,255,0.9);
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 34px;
      padding: 16px 22px;
      font-size: 18px;
      width: 100%;
      text-align: center;
      letter-spacing: 2px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .ios-input:focus {
      outline: none;
      border-color: #2c6e2f;
      box-shadow: 0 0 0 3px rgba(44,110,47,0.2);
    }
    .ios-button {
      background: #2c6e2f;
      border: none;
      border-radius: 44px;
      padding: 14px 24px;
      font-size: 18px;
      font-weight: 590;
      color: white;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .ios-button.secondary {
      background: rgba(44,110,47,0.6);
      margin-top: 12px;
    }
    .ios-button:active {
      transform: scale(0.97);
    }
    .dashboard {
      display: none;
    }
    .profile-header {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(16px);
      border-radius: 44px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .partner-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar-icon {
      background: #e9f0e9;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #2c6e2f;
    }
    .partner-name {
      font-weight: 600;
      font-size: 20px;
    }
    .partner-id-badge {
      background: rgba(0,0,0,0.05);
      padding: 8px 16px;
      border-radius: 40px;
      font-family: monospace;
      font-weight: 500;
    }
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-item {
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 18px;
      flex: 1;
      text-align: center;
    }
    .stat-label {
      font-size: 14px;
      color: #4c5c4e;
      letter-spacing: 0.5px;
    }
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #1e2f24;
      margin-top: 8px;
    }
    .action-buttons {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
    }
    .action-buttons .ios-button {
      width: auto;
      flex: 1;
      background: rgba(44,110,47,0.85);
      backdrop-filter: blur(10px);
    }
    .orders-section {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      border-radius: 44px;
      padding: 20px;
      margin-top: 16px;
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
    }
    .filter-select, .filter-date {
      background: white;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 34px;
      padding: 10px 16px;
      font-size: 15px;
    }
    .orders-table-wrapper {
      overflow-x: auto;
      border-radius: 28px;
    }
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 500px;
    }
    .orders-table th {
      text-align: left;
      padding: 14px 10px;
      background: rgba(0,0,0,0.03);
      font-weight: 590;
      color: #2b4b2e;
    }
    .orders-table td {
      padding: 12px 10px;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
    }
    .status-badge {
      background: #eef2ff;
      border-radius: 30px;
      padding: 4px 12px;
      display: inline-block;
      font-size: 12px;
    }
    .modal, .reg-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-content {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(30px);
      width: 90%;
      max-width: 540px;
      border-radius: 48px;
      padding: 28px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-content h3 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      font-weight: 500;
      margin-bottom: 8px;
      display: block;
      color: #1e3a2b;
    }
    .ios-input-light, .ios-select, .ios-textarea {
      width: 100%;
      padding: 14px 18px;
      background: #f2f4f6;
      border: 0.5px solid #e2e6ea;
      border-radius: 34px;
      font-size: 16px;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }
    .checkbox-item {
      background: #f2f4f6;
      padding: 8px 16px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .radio-group {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #3a5e40;
    }
    footer a {
      color: #2c6e2f;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dashed #2c6e2f;
    }
    .error-msg {
      background: rgba(255, 220, 220, 0.9);
      border-radius: 28px;
      padding: 12px;
      color: #b11;
      margin-bottom: 16px;
    }
    .success-msg {
      background: rgba(200, 230, 200, 0.9);
      border-radius: 28px;
      padding: 12px;
      color: #1f6e43;
      margin-bottom: 16px;
    }
    @media (max-width: 600px) {
      body { padding: 12px; }
      .stat-number { font-size: 22px; }
      .action-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <div id="authPanel" class="glass-card auth-card">
    <h1><i class="fas fa-couch"></i> Мебель Шара</h1>
    <p>Партнёрская программа</p>
    <input type="text" id="partnerIdInput" class="ios-input" maxlength="4" placeholder="Ваш 4-символьный ID" autocomplete="off">
    <button id="loginBtn" class="ios-button"><i class="fas fa-arrow-right"></i> Войти</button>
    <button id="showRegBtn" class="ios-button secondary"><i class="fas fa-user-plus"></i> Регистрация в партнёрке</button>
  </div>

  <div id="dashboard" class="dashboard fade-in">
    <div class="glass-card profile-header">
      <div class="partner-info">
        <div class="avatar-icon"><i class="fas fa-user-astronaut"></i></div>
        <div>
          <div class="partner-name" id="partnerName">—</div>
          <div class="partner-id-badge" id="displayPartnerId">ID: —</div>
        </div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-label">Всего заказов, ₽</div><div class="stat-number" id="totalSum">0 ₽</div></div>
      <div class="stat-item"><div class="stat-label">Оплачено, ₽</div><div class="stat-number" id="paidSum">0 ₽</div></div>
    </div>
    <div class="action-buttons">
      <button class="ios-button" id="createOrderBtn"><i class="fas fa-plus-circle"></i> Заявка</button>
      <button class="ios-button" id="viewOrdersBtn"><i class="fas fa-list-ul"></i> Заказы</button>
    </div>
    <div id="ordersPanel" class="orders-section" style="display: none;">
      <div class="filter-bar">
        <select id="statusFilter" class="filter-select">
          <option value="Все">Все статусы</option>
          <option value="Новая">Новая</option>
          <option value="Замер назначен">Замер</option>
          <option value="Счет выставлен">Счет</option>
          <option value="Оплачено">Оплачено</option>
          <option value="Доставлена">Доставлена</option>
          <option value="Собрана">Собрана</option>
          <option value="Отказ клиента">Отказ</option>
        </select>
        <input type="date" id="dateFrom" class="filter-date" placeholder="с">
        <input type="date" id="dateTo" class="filter-date" placeholder="по">
        <button id="applyFilterBtn" class="ios-button" style="padding: 10px 20px;">Применить</button>
      </div>
      <div id="ordersList"><div class="loading">Загрузка...</div></div>
    </div>
  </div>
  <footer><i class="fas fa-file-signature"></i> <a href="#" id="contractLink">Агентский договор</a></footer>
</div>

<!-- Модалка заявки -->
<div id="orderModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-pen-alt"></i> Новая заявка</h3>
    <div class="form-group"><label>ФИО клиента *</label><input type="text" id="clientName" class="ios-input-light" placeholder="Иванов Иван"></div>
    <div class="form-group"><label>Телефон * (10 цифр)</label><input type="tel" id="clientPhone" class="ios-input-light" maxlength="10" placeholder="9123456789"></div>
    <div class="form-group"><label>Адрес</label><input type="text" id="address" class="ios-input-light" placeholder="Москва, ул..."></div>
    <div class="form-group"><label>Категории мебели</label><div class="checkbox-group" id="categoriesGroup"></div></div>
    <div class="form-group"><label>Нужен замер?</label><div class="radio-group"><label class="radio-label"><input type="radio" name="measure" value="Да" checked> Да</label><label class="radio-label"><input type="radio" name="measure" value="Нет"> Нет</label></div></div>
    <div class="form-group"><label>Нужна сборка?</label><div class="radio-group"><label class="radio-label"><input type="radio" name="assembly" value="Да" checked> Да</label><label class="radio-label"><input type="radio" name="assembly" value="Нет"> Нет</label></div></div>
    <div class="form-group"><label>Доставка/Самовывоз</label><div class="radio-group"><label class="radio-label"><input type="radio" name="delivery" value="Доставка" checked> Доставка</label><label class="radio-label"><input type="radio" name="delivery" value="Самовывоз"> Самовывоз (Подольск)</label></div></div>
    <div class="form-group"><label>Когда позвонить клиенту</label><input type="datetime-local" id="callTime" class="ios-input-light"></div>
    <div class="form-group"><label>Комментарий</label><textarea id="comment" rows="2" class="ios-textarea"></textarea></div>
    <div class="modal-buttons" style="display: flex; gap: 12px; margin-top: 24px;">
      <button id="closeModalBtn" class="ios-button" style="background: #aaa;">Отмена</button>
      <button id="submitOrderBtn" class="ios-button">Отправить</button>
    </div>
  </div>
</div>

<!-- Модалка регистрации -->
<div id="regModal" class="reg-modal">
  <div class="modal-content">
    <h3><i class="fas fa-user-plus"></i> Регистрация партнёра</h3>
    <div class="form-group"><label>ФИО *</label><input type="text" id="regFullName" class="ios-input-light" placeholder="Иванов Иван Иванович"></div>
    <div class="form-group">
      <label>Телефон * (10 цифр)</label>
      <div style="position: relative;">
        <span style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #8E8E93; font-weight: 500;">+7</span>
        <input type="tel" id="regPhone" class="ios-input-light" maxlength="10" placeholder="9123456789" style="padding-left: 48px;">
      </div>
      <small style="color: #8E8E93; display: block; margin-top: 6px;">Введите 10 цифр после +7</small>
    </div>
    <div class="form-group">
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/Max_%28app%29_logo.svg/512px-Max_%28app%29_logo.svg.png" alt="МАКС" style="width: 32px; height: 32px; border-radius: 12px;">
        <label style="margin: 0; font-weight: 500;">ID в мессенджере МАКС <span style="color: #6c7a6e;">(необязательно)</span></label>
      </div>
      <input type="text" id="regMessengerId" class="ios-input-light" placeholder="Ваш логин @example">
    </div>
    <div id="regMessage"></div>
    <div class="modal-buttons" style="display: flex; gap: 12px; margin-top: 20px;">
      <button id="closeRegBtn" class="ios-button" style="background: #aaa;">Отмена</button>
      <button id="submitRegBtn" class="ios-button">Зарегистрироваться</button>
    </div>
  </div>
</div>

<script>
  // ========== ВАШ URL ВЕБ-ПРИЛОЖЕНИЯ ==========
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWtZ0rX2QpBlyAMaFbgxtx4au9TjuY9WsOMEuJJL3dfHi0sXUmMmuA-_qYkA3veGhevA/exec';
  
  let currentPartnerId = null;

  // DOM элементы
  const authPanel = document.getElementById('authPanel');
  const dashboard = document.getElementById('dashboard');
  const partnerNameSpan = document.getElementById('partnerName');
  const displayPartnerIdSpan = document.getElementById('displayPartnerId');
  const totalSumSpan = document.getElementById('totalSum');
  const paidSumSpan = document.getElementById('paidSum');
  const ordersPanel = document.getElementById('ordersPanel');
  const ordersListDiv = document.getElementById('ordersList');
  const viewOrdersBtn = document.getElementById('viewOrdersBtn');
  const createOrderBtn = document.getElementById('createOrderBtn');
  const modal = document.getElementById('orderModal');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const submitOrderBtn = document.getElementById('submitOrderBtn');
  const applyFilterBtn = document.getElementById('applyFilterBtn');
  const statusFilter = document.getElementById('statusFilter');
  const dateFrom = document.getElementById('dateFrom');
  const dateTo = document.getElementById('dateTo');
  const contractLink = document.getElementById('contractLink');
  const showRegBtn = document.getElementById('showRegBtn');
  const regModal = document.getElementById('regModal');
  const closeRegBtn = document.getElementById('closeRegBtn');
  const submitRegBtn = document.getElementById('submitRegBtn');
  const regFullName = document.getElementById('regFullName');
  const regPhone = document.getElementById('regPhone');
  const regMessengerId = document.getElementById('regMessengerId');
  const regMessage = document.getElementById('regMessage');

  // Замените ссылку на реальный документ
  contractLink.href = 'https://docs.google.com/document/d/ваш_документ/edit';
  contractLink.target = '_blank';

  const categoriesList = ['Кухня','Спальня','Гостиная','Детская','Прихожая','Шкаф-купе','Диван','Мягкая кровать'];
  function renderCategoriesCheckboxes() {
    const container = document.getElementById('categoriesGroup');
    container.innerHTML = '';
    categoriesList.forEach(cat => {
      const label = document.createElement('label');
      label.className = 'checkbox-item';
      label.innerHTML = `<input type="checkbox" value="${cat}"> ${cat}`;
      container.appendChild(label);
    });
  }
  function getSelectedCategories() {
    const checkboxes = document.querySelectorAll('#categoriesGroup input[type="checkbox"]:checked');
    return Array.from(checkboxes).map(cb => cb.value).join(', ');
  }

  function formatCurrency(amount) {
    amount = amount || 0;
    return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', minimumFractionDigits: 0 }).format(amount);
  }

  async function loadPartnerFullInfo(partnerId) {
    try {
      const url = `${SCRIPT_URL}?action=getPartnerInfo&partnerId=${encodeURIComponent(partnerId)}`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (data.error) {
        partnerNameSpan.innerText = 'Ошибка';
        totalSumSpan.innerText = '0 ₽';
        paidSumSpan.innerText = '0 ₽';
        return false;
      }
      partnerNameSpan.innerText = data.name || 'Риелтор';
      totalSumSpan.innerText = formatCurrency(data.totalOrdersSum);
      paidSumSpan.innerText = formatCurrency(data.paidOrdersSum);
      return true;
    } catch (err) {
      console.error(err);
      partnerNameSpan.innerText = 'Ошибка соединения';
      return false;
    }
  }

  async function loadOrders(partnerId, status, from, to) {
    ordersListDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>';
    try {
      let url = `${SCRIPT_URL}?action=getOrders&partnerId=${encodeURIComponent(partnerId)}`;
      if (status && status !== 'Все') url += `&status=${encodeURIComponent(status)}`;
      if (from) url += `&dateFrom=${from}`;
      if (to) url += `&dateTo=${to}`;
      const resp = await fetch(url);
      const orders = await resp.json();
      if (orders.error) {
        ordersListDiv.innerHTML = `<div class="error-msg">${orders.error}</div>`;
        return;
      }
      if (!orders.length) {
        ordersListDiv.innerHTML = '<div style="padding: 20px; text-align:center;">Заказов не найдено</div>';
        return;
      }
      let html = `<div class="orders-table-wrapper"><table class="orders-table">
        <thead><tr><th>ID</th><th>Дата</th><th>Клиент</th><th>Тел.</th><th>Статус</th><th>Сумма заказа</th><th>Оплачено</th></tr></thead><tbody>`;
      orders.forEach(order => {
        html += `<tr>
          <td>${escapeHtml(order.id)}</td>
          <td>${order.date ? new Date(order.date).toLocaleDateString() : ''}</td>
          <td>${escapeHtml(order.clientName)}</td>
          <td>${escapeHtml(order.clientPhone)}</td>
          <td><span class="status-badge">${escapeHtml(order.status)}</span></td>
          <td>${formatCurrency(order.orderSum)}</td>
          <td>${formatCurrency(order.paidSum)}</td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
      ordersListDiv.innerHTML = html;
    } catch (err) {
      ordersListDiv.innerHTML = `<div class="error-msg">Ошибка: ${err.message}</div>`;
    }
  }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  async function createOrder(orderData) {
    const response = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(orderData),
      headers: { 'Content-Type': 'application/json' }
    });
    return await response.json();
  }

  async function onSubmitOrder() {
    if (!currentPartnerId) return;
    const clientName = document.getElementById('clientName').value.trim();
    let clientPhone = document.getElementById('clientPhone').value.trim();
    clientPhone = clientPhone.replace(/\D/g, '').slice(0,10);
    if (clientName === '' || clientPhone === '' || clientPhone.length !== 10) {
      alert('Заполните ФИО и телефон (ровно 10 цифр)');
      return;
    }
    const categories = getSelectedCategories();
    const needMeasure = document.querySelector('input[name="measure"]:checked').value;
    const needAssembly = document.querySelector('input[name="assembly"]:checked').value;
    const deliveryType = document.querySelector('input[name="delivery"]:checked').value;
    const callTime = document.getElementById('callTime').value;
    const comment = document.getElementById('comment').value;

    const payload = {
      partnerId: currentPartnerId,
      clientName, clientPhone,
      address: document.getElementById('address').value,
      categories: categories,
      needMeasure, needAssembly, deliveryType,
      callTime, comment,
      orderSum: 0
    };
    const result = await createOrder(payload);
    if (result.success) {
      alert(`Заявка ${result.orderId} создана! Клиенту перезвонят.`);
      modal.style.display = 'none';
      await loadPartnerFullInfo(currentPartnerId);
      if (ordersPanel.style.display !== 'none') {
        loadOrders(currentPartnerId, statusFilter.value, dateFrom.value, dateTo.value);
      }
    } else {
      alert('Ошибка: ' + (result.error || 'неизвестная'));
    }
  }

  function getPhoneForSubmit() {
    const raw = regPhone.value.replace(/\D/g, '');
    return raw.slice(0,10);
  }

  async function registerPartner() {
    const fullName = regFullName.value.trim();
    const phone = getPhoneForSubmit();
    const messengerId = regMessengerId.value.trim();
    
    regMessage.innerHTML = '';
    if (!fullName || !phone || phone.length !== 10) {
      regMessage.innerHTML = '<div class="error-msg">Заполните ФИО и корректный телефон (10 цифр)</div>';
      return;
    }
    
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'register', fullName, phone, messengerId }),
        headers: { 'Content-Type': 'application/json' }
      });
      const result = await response.json();
      if (result.success) {
        regMessage.innerHTML = `<div class="success-msg">Регистрация успешна! Ваш ID: <strong>${result.partnerId}</strong>. Теперь войдите.</div>`;
        setTimeout(() => {
          regModal.style.display = 'none';
          document.getElementById('partnerIdInput').value = result.partnerId;
          regFullName.value = '';
          regPhone.value = '';
          regMessengerId.value = '';
          regMessage.innerHTML = '';
        }, 2000);
      } else {
        regMessage.innerHTML = `<div class="error-msg">${result.error || 'Ошибка регистрации'}</div>`;
      }
    } catch (err) {
      regMessage.innerHTML = `<div class="error-msg">Ошибка соединения: ${err.message}</div>`;
    }
  }

  async function login() {
    const pid = document.getElementById('partnerIdInput').value.trim().toUpperCase();
    if (!pid || pid.length !== 4) {
      alert('Введите корректный 4-символьный ID');
      return;
    }
    const testUrl = `${SCRIPT_URL}?action=getPartnerInfo&partnerId=${encodeURIComponent(pid)}`;
    const resp = await fetch(testUrl);
    const info = await resp.json();
    if (info.error) {
      alert('Риелтор с таким ID не найден. Проверьте ID или зарегистрируйтесь.');
      return;
    }
    currentPartnerId = pid;
    localStorage.setItem('partnerId', pid);
    authPanel.style.display = 'none';
    dashboard.style.display = 'block';
    displayPartnerIdSpan.innerText = `ID: ${pid}`;
    partnerNameSpan.innerText = info.name || 'Риелтор';
    totalSumSpan.innerText = formatCurrency(info.totalOrdersSum);
    paidSumSpan.innerText = formatCurrency(info.paidOrdersSum);
  }

  function showOrders() {
    ordersPanel.style.display = 'block';
    loadOrders(currentPartnerId, statusFilter.value, dateFrom.value, dateTo.value);
  }

  // Обработчики
  document.getElementById('loginBtn').addEventListener('click', login);
  viewOrdersBtn.addEventListener('click', showOrders);
  createOrderBtn.addEventListener('click', () => {
    document.getElementById('clientName').value = '';
    document.getElementById('clientPhone').value = '';
    document.getElementById('address').value = '';
    document.getElementById('comment').value = '';
    document.getElementById('callTime').value = '';
    renderCategoriesCheckboxes();
    modal.style.display = 'flex';
  });
  closeModalBtn.addEventListener('click', () => modal.style.display = 'none');
  submitOrderBtn.addEventListener('click', onSubmitOrder);
  applyFilterBtn.addEventListener('click', () => {
    if (currentPartnerId && ordersPanel.style.display !== 'none')
      loadOrders(currentPartnerId, statusFilter.value, dateFrom.value, dateTo.value);
  });
  window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; if (e.target === regModal) regModal.style.display = 'none'; };
  
  showRegBtn.addEventListener('click', () => { regModal.style.display = 'flex'; regMessage.innerHTML = ''; });
  closeRegBtn.addEventListener('click', () => { regModal.style.display = 'none'; });
  submitRegBtn.addEventListener('click', registerPartner);
  
  regPhone.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '').slice(0,10);
  });
  
  const savedId = localStorage.getItem('partnerId');
  if (savedId) document.getElementById('partnerIdInput').value = savedId;
  
  const phoneInput = document.getElementById('clientPhone');
  phoneInput.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '').slice(0,10);
  });
  renderCategoriesCheckboxes();
</script>
</body>
</html>
