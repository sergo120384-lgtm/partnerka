<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Мебель Шара — партнёрский кабинет</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 44px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 1px 0 rgba(255,255,255,0.5) inset;
      border: 0.5px solid rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    .fade-in {
      animation: fadeIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .auth-card {
      padding: 40px 28px;
      text-align: center;
    }
    .auth-card h1 {
      font-size: 32px;
      font-weight: 600;
      background: linear-gradient(135deg, #1e3c2c, #2a6e3a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .ios-input {
      background: rgba(255,255,255,0.9);
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 34px;
      padding: 16px 22px;
      font-size: 18px;
      width: 100%;
      text-align: center;
      letter-spacing: 2px;
      font-weight: 500;
    }
    .ios-input:focus {
      outline: none;
      border-color: #2c6e2f;
      box-shadow: 0 0 0 3px rgba(44,110,47,0.2);
    }
    .ios-button {
      background: #2c6e2f;
      border: none;
      border-radius: 44px;
      padding: 14px 24px;
      font-size: 18px;
      font-weight: 590;
      color: white;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .ios-button.secondary {
      background: rgba(44,110,47,0.6);
      margin-top: 12px;
    }
    .ios-button:active {
      transform: scale(0.97);
    }
    .dashboard {
      display: none;
    }
    .profile-header {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(16px);
      border-radius: 44px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: center;
    }
    .partner-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar-icon {
      background: #e9f0e9;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #2c6e2f;
    }
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-item {
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 18px;
      flex: 1;
      text-align: center;
    }
    .stat-label {
      font-size: 14px;
      color: #4c5c4e;
    }
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #1e2f24;
    }
    .action-buttons {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
    }
    .action-buttons .ios-button {
      width: auto;
      flex: 1;
    }
    .orders-section {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      border-radius: 44px;
      padding: 20px;
      margin-top: 16px;
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
    }
    .filter-select, .filter-date {
      background: white;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 34px;
      padding: 10px 16px;
    }
    .orders-table-wrapper {
      overflow-x: auto;
    }
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 500px;
    }
    .orders-table th, .orders-table td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
    }
    .status-badge {
      background: #eef2ff;
      border-radius: 30px;
      padding: 4px 12px;
      display: inline-block;
      font-size: 12px;
    }
    .modal, .reg-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-content {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(30px);
      width: 90%;
      max-width: 540px;
      border-radius: 48px;
      padding: 28px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      font-weight: 500;
      margin-bottom: 8px;
      display: block;
      color: #1e3a2b;
    }
    .ios-input-light, .ios-textarea {
      width: 100%;
      padding: 14px 18px;
      background: #f2f4f6;
      border: 0.5px solid #e2e6ea;
      border-radius: 34px;
      font-size: 16px;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }
    .checkbox-item {
      background: #f2f4f6;
      padding: 8px 16px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .radio-group {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #3a5e40;
    }
    .error-msg {
      background: rgba(255, 220, 220, 0.9);
      border-radius: 28px;
      padding: 12px;
      color: #b11;
    }
    .success-msg {
      background: rgba(200, 230, 200, 0.9);
      border-radius: 28px;
      padding: 12px;
      color: #1f6e43;
    }
    @media (max-width: 600px) {
      .action-buttons { flex-direction: column; }
      .stats-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <div id="authPanel" class="glass-card auth-card">
    <h1><i class="fas fa-couch"></i> Мебель Шара</h1>
    <p>Партнёрская программа</p>
    <input type="text" id="partnerIdInput" class="ios-input" maxlength="4" placeholder="Ваш ID">
    <button id="loginBtn" class="ios-button">Войти</button>
    <button id="showRegBtn" class="ios-button secondary">Регистрация</button>
  </div>

  <div id="dashboard" class="dashboard">
    <div class="glass-card profile-header">
      <div class="partner-info">
        <div class="avatar-icon"><i class="fas fa-user"></i></div>
        <div><span id="partnerName">—</span><br><span id="displayPartnerId">ID: —</span></div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-label">Всего заказов, ₽</div><div class="stat-number" id="totalSum">0</div></div>
      <div class="stat-item"><div class="stat-label">Оплачено, ₽</div><div class="stat-number" id="paidSum">0</div></div>
    </div>
    <div class="action-buttons">
      <button id="createOrderBtn" class="ios-button">Заявка</button>
      <button id="viewOrdersBtn" class="ios-button">Заказы</button>
    </div>
    <div id="ordersPanel" class="orders-section" style="display:none">
      <div class="filter-bar">
        <select id="statusFilter"><option>Все</option><option>Новая</option><option>Оплачено</option><option>Доставлена</option><option>Собрана</option><option>Отказ</option></select>
        <input type="date" id="dateFrom"> <input type="date" id="dateTo">
        <button id="applyFilterBtn" class="ios-button">Применить</button>
      </div>
      <div id="ordersList">Загрузка...</div>
    </div>
  </div>
  <footer><a href="#" id="contractLink">Агентский договор</a></footer>
</div>

<!-- Модалка заказа -->
<div id="orderModal" class="modal">
  <div class="modal-content">
    <h3>Новая заявка</h3>
    <div class="form-group"><label>ФИО клиента *</label><input id="clientName" class="ios-input-light"></div>
    <div class="form-group"><label>Телефон (10 цифр) *</label><input id="clientPhone" class="ios-input-light" maxlength="10"></div>
    <div class="form-group"><label>Адрес</label><input id="address" class="ios-input-light"></div>
    <div class="form-group"><label>Категории</label><div id="categoriesGroup" class="checkbox-group"></div></div>
    <div class="form-group"><label>Замер?</label><div class="radio-group"><label><input type="radio" name="measure" value="Да" checked> Да</label><label><input type="radio" name="measure" value="Нет"> Нет</label></div></div>
    <div class="form-group"><label>Сборка?</label><div class="radio-group"><label><input type="radio" name="assembly" value="Да" checked> Да</label><label><input type="radio" name="assembly" value="Нет"> Нет</label></div></div>
    <div class="form-group"><label>Доставка/Самовывоз</label><div class="radio-group"><label><input type="radio" name="delivery" value="Доставка" checked> Доставка</label><label><input type="radio" name="delivery" value="Самовывоз"> Самовывоз</label></div></div>
    <div class="form-group"><label>Когда позвонить</label><input type="datetime-local" id="callTime" class="ios-input-light"></div>
    <div class="form-group"><label>Комментарий</label><textarea id="comment" rows="2" class="ios-textarea"></textarea></div>
    <div style="display:flex; gap:12px; margin-top:20px">
      <button id="closeModalBtn" class="ios-button" style="background:#aaa;">Отмена</button>
      <button id="submitOrderBtn" class="ios-button">Отправить</button>
    </div>
  </div>
</div>

<!-- Модалка регистрации -->
<div id="regModal" class="reg-modal">
  <div class="modal-content">
    <h3>Регистрация партнёра</h3>
    <div class="form-group"><label>ФИО *</label><input id="regFullName" class="ios-input-light"></div>
    <div class="form-group"><label>Телефон (10 цифр) *</label><div style="position:relative"><span style="position:absolute; left:18px; top:50%; transform:translateY(-50%);">+7</span><input id="regPhone" class="ios-input-light" maxlength="10" style="padding-left:48px;"></div><small>Введите 10 цифр после +7</small></div>
    <div class="form-group"><div style="display:flex; gap:12px; align-items:center"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/Max_%28app%29_logo.svg/512px-Max_%28app%29_logo.svg.png" width="32" style="border-radius:12px"><label>ID в МАКС (необязательно)</label></div><input id="regMessengerId" class="ios-input-light"></div>
    <div id="regMessage"></div>
    <div style="display:flex; gap:12px; margin-top:20px">
      <button id="closeRegBtn" class="ios-button" style="background:#aaa;">Отмена</button>
      <button id="submitRegBtn" class="ios-button">Зарегистрироваться</button>
    </div>
  </div>
</div>

<script>
  // ==================== ВАШ URL ====================
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWtZ0rX2QpBlyAMaFbgxtx4au9TjuY9WsOMEuJJL3dfHi0sXUmMmuA-_qYkA3veGhevA/exec';
  
  let currentPartnerId = null;
  const categoriesList = ['Кухня','Спальня','Гостиная','Детская','Прихожая','Шкаф-купе','Диван','Мягкая кровать'];
  
  // DOM
  const authPanel = document.getElementById('authPanel');
  const dashboard = document.getElementById('dashboard');
  const partnerNameSpan = document.getElementById('partnerName');
  const displayPartnerIdSpan = document.getElementById('displayPartnerId');
  const totalSumSpan = document.getElementById('totalSum');
  const paidSumSpan = document.getElementById('paidSum');
  const ordersPanel = document.getElementById('ordersPanel');
  const ordersListDiv = document.getElementById('ordersList');
  const createOrderBtn = document.getElementById('createOrderBtn');
  const viewOrdersBtn = document.getElementById('viewOrdersBtn');
  const orderModal = document.getElementById('orderModal');
  const regModal = document.getElementById('regModal');
  const submitOrderBtn = document.getElementById('submitOrderBtn');
  const submitRegBtn = document.getElementById('submitRegBtn');
  const regMessage = document.getElementById('regMessage');
  
  // Вспомогательные функции
  function formatCurrency(amount) { return Number(amount).toLocaleString('ru-RU') + ' ₽'; }
  function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }
  function renderCategories() {
    const container = document.getElementById('categoriesGroup');
    container.innerHTML = '';
    categoriesList.forEach(cat => {
      const label = document.createElement('label');
      label.className = 'checkbox-item';
      label.innerHTML = `<input type="checkbox" value="${cat}"> ${cat}`;
      container.appendChild(label);
    });
  }
  function getSelectedCategories() {
    return Array.from(document.querySelectorAll('#categoriesGroup input:checked')).map(cb => cb.value).join(', ');
  }
  
  // Логирование ошибок
  function logError(context, error) {
    console.error(`[${context}]`, error);
    const msg = document.createElement('div');
    msg.className = 'error-msg';
    msg.innerText = `${context}: ${error.message || error}`;
    document.body.prepend(msg);
    setTimeout(() => msg.remove(), 5000);
  }
  
  // GET запросы
  async function loadPartnerInfo(partnerId) {
    try {
      const url = `${SCRIPT_URL}?action=getPartnerInfo&partnerId=${encodeURIComponent(partnerId)}`;
      console.log('GET info:', url);
      const resp = await fetch(url);
      const data = await resp.json();
      console.log('GET info ответ:', data);
      if (data.error) throw new Error(data.error);
      partnerNameSpan.innerText = data.name || 'Без имени';
      totalSumSpan.innerText = formatCurrency(data.totalOrdersSum);
      paidSumSpan.innerText = formatCurrency(data.paidOrdersSum);
      return true;
    } catch (err) {
      logError('loadPartnerInfo', err);
      return false;
    }
  }
  
  async function loadOrders(partnerId, status, from, to) {
    ordersListDiv.innerHTML = 'Загрузка...';
    try {
      let url = `${SCRIPT_URL}?action=getOrders&partnerId=${encodeURIComponent(partnerId)}`;
      if (status && status !== 'Все') url += `&status=${encodeURIComponent(status)}`;
      if (from) url += `&dateFrom=${from}`;
      if (to) url += `&dateTo=${to}`;
      const resp = await fetch(url);
      const orders = await resp.json();
      if (orders.error) throw new Error(orders.error);
      if (!orders.length) { ordersListDiv.innerHTML = 'Нет заказов'; return; }
      let html = `<div class="orders-table-wrapper"><table class="orders-table"><tr><th>ID</th><th>Дата</th><th>Клиент</th><th>Тел.</th><th>Статус</th><th>Сумма</th><th>Оплачено</th></tr>`;
      orders.forEach(o => {
        html += `<tr><td>${escapeHtml(o.id)}</td><td>${o.date ? new Date(o.date).toLocaleDateString() : ''}</td><td>${escapeHtml(o.clientName)}</td><td>${escapeHtml(o.clientPhone)}</td><td class="status-badge">${escapeHtml(o.status)}</td><td>${formatCurrency(o.orderSum)}</td><td>${formatCurrency(o.paidSum)}</td></tr>`;
      });
      html += `</table></div>`;
      ordersListDiv.innerHTML = html;
    } catch (err) {
      logError('loadOrders', err);
      ordersListDiv.innerHTML = 'Ошибка загрузки заказов';
    }
  }
  
  // POST запросы с детальным логом
  async function postRequest(payload, actionName) {
    console.log(`POST ${actionName} отправляем:`, payload);
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
        headers: { 'Content-Type': 'application/json' }
      });
      console.log(`POST ${actionName} статус:`, response.status);
      const text = await response.text();
      console.log(`POST ${actionName} сырой ответ:`, text);
      let result;
      try { result = JSON.parse(text); } catch(e) { result = { success: false, error: 'Не JSON ответ: ' + text.substring(0,200) }; }
      console.log(`POST ${actionName} разобранный ответ:`, result);
      return result;
    } catch (err) {
      console.error(`POST ${actionName} ошибка сети:`, err);
      return { success: false, error: err.message };
    }
  }
  
  // Регистрация
  async function registerPartner() {
    const fullName = document.getElementById('regFullName').value.trim();
    let phone = document.getElementById('regPhone').value.replace(/\D/g, '').slice(0,10);
    const messengerId = document.getElementById('regMessengerId').value.trim();
    if (!fullName || phone.length !== 10) {
      regMessage.innerHTML = '<div class="error-msg">Заполните ФИО и 10 цифр телефона</div>';
      return;
    }
    regMessage.innerHTML = '<div class="success-msg">Отправка...</div>';
    const result = await postRequest({ action: 'register', fullName, phone, messengerId }, 'register');
    if (result.success) {
      regMessage.innerHTML = `<div class="success-msg">Регистрация успешна! Ваш ID: ${result.partnerId}</div>`;
      setTimeout(() => {
        regModal.style.display = 'none';
        document.getElementById('partnerIdInput').value = result.partnerId;
        regMessage.innerHTML = '';
      }, 2000);
    } else {
      regMessage.innerHTML = `<div class="error-msg">${result.error || 'Ошибка регистрации'}</div>`;
    }
  }
  
  // Создание заказа
  async function onSubmitOrder() {
    if (!currentPartnerId) return;
    const clientName = document.getElementById('clientName').value.trim();
    let clientPhone = document.getElementById('clientPhone').value.replace(/\D/g, '').slice(0,10);
    if (!clientName || clientPhone.length !== 10) {
      alert('Заполните ФИО и телефон (10 цифр)');
      return;
    }
    const payload = {
      partnerId: currentPartnerId,
      clientName,
      clientPhone: clientPhone,
      address: document.getElementById('address').value,
      categories: getSelectedCategories(),
      needMeasure: document.querySelector('input[name="measure"]:checked').value,
      needAssembly: document.querySelector('input[name="assembly"]:checked').value,
      deliveryType: document.querySelector('input[name="delivery"]:checked').value,
      callTime: document.getElementById('callTime').value,
      comment: document.getElementById('comment').value,
      orderSum: 0
    };
    const result = await postRequest(payload, 'createOrder');
    if (result.success) {
      alert(`Заявка ${result.orderId} создана!`);
      orderModal.style.display = 'none';
      await loadPartnerInfo(currentPartnerId);
      if (ordersPanel.style.display !== 'none') {
        loadOrders(currentPartnerId, document.getElementById('statusFilter').value, document.getElementById('dateFrom').value, document.getElementById('dateTo').value);
      }
    } else {
      alert('Ошибка: ' + (result.error || 'неизвестная'));
    }
  }
  
  // Вход
  async function login() {
    const pid = document.getElementById('partnerIdInput').value.trim().toUpperCase();
    if (!pid || pid.length !== 4) { alert('Введите 4-символьный ID'); return; }
    const url = `${SCRIPT_URL}?action=getPartnerInfo&partnerId=${encodeURIComponent(pid)}`;
    const resp = await fetch(url);
    const info = await resp.json();
    if (info.error) { alert('Риелтор не найден'); return; }
    currentPartnerId = pid;
    localStorage.setItem('partnerId', pid);
    authPanel.style.display = 'none';
    dashboard.style.display = 'block';
    displayPartnerIdSpan.innerText = `ID: ${pid}`;
    partnerNameSpan.innerText = info.name || 'Без имени';
    totalSumSpan.innerText = formatCurrency(info.totalOrdersSum);
    paidSumSpan.innerText = formatCurrency(info.paidOrdersSum);
  }
  
  function showOrders() {
    ordersPanel.style.display = 'block';
    loadOrders(currentPartnerId, document.getElementById('statusFilter').value, document.getElementById('dateFrom').value, document.getElementById('dateTo').value);
  }
  
  // Обработчики
  document.getElementById('loginBtn').addEventListener('click', login);
  viewOrdersBtn.addEventListener('click', showOrders);
  createOrderBtn.addEventListener('click', () => {
    document.getElementById('clientName').value = '';
    document.getElementById('clientPhone').value = '';
    document.getElementById('address').value = '';
    document.getElementById('comment').value = '';
    document.getElementById('callTime').value = '';
    renderCategories();
    orderModal.style.display = 'flex';
  });
  document.getElementById('closeModalBtn').addEventListener('click', () => orderModal.style.display = 'none');
  submitOrderBtn.addEventListener('click', onSubmitOrder);
  document.getElementById('applyFilterBtn').addEventListener('click', () => {
    if (currentPartnerId) loadOrders(currentPartnerId, document.getElementById('statusFilter').value, document.getElementById('dateFrom').value, document.getElementById('dateTo').value);
  });
  window.onclick = (e) => { if (e.target === orderModal) orderModal.style.display = 'none'; if (e.target === regModal) regModal.style.display = 'none'; };
  document.getElementById('showRegBtn').addEventListener('click', () => regModal.style.display = 'flex');
  document.getElementById('closeRegBtn').addEventListener('click', () => regModal.style.display = 'none');
  submitRegBtn.addEventListener('click', registerPartner);
  document.getElementById('regPhone').addEventListener('input', (e) => e.target.value = e.target.value.replace(/\D/g, '').slice(0,10));
  document.getElementById('clientPhone').addEventListener('input', (e) => e.target.value = e.target.value.replace(/\D/g, '').slice(0,10));
  const savedId = localStorage.getItem('partnerId');
  if (savedId) document.getElementById('partnerIdInput').value = savedId;
  renderCategories();
  document.getElementById('contractLink').href = 'https://docs.google.com/document/d/ваш_документ/edit';
</script>
</body>
</html>
